<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="disc" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#2a1f16"/>
      <stop offset="100%" stop-color="#150f0a"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4d976"/>
      <stop offset="100%" stop-color="#9c7a1f"/>
    </linearGradient>
  </defs>
  <circle cx="48" cy="48" r="45" fill="url(#disc)" stroke="url(#ring)" stroke-width="5"/>
  <circle cx="48" cy="48" r="38" fill="none" stroke="#d4af37" stroke-opacity="0.4" stroke-width="1"/>
  <g transform="translate(48,48)">
    <!-- finish-line banner across a path: the course is finished -->
    <path d="M-22,20 Q0,10 22,20" fill="none" stroke="#8c7f61" stroke-width="3" stroke-linecap="round"/>
    <path d="M-16,-22 L16,-22 L16,-6 L0,2 L-16,-6 Z" fill="#8c7f61" fill-opacity="0.25" stroke="#f4d976" stroke-width="2"/>
    <path d="M-9,-18 L-3,-18 L-3,-12 L-9,-12 Z M3,-18 L9,-18 L9,-12 L3,-12 Z M-3,-12 L3,-12 L3,-6 L-3,-6 Z" fill="#f4d976"/>
    <line x1="0" y1="2" x2="0" y2="20" stroke="#d4af37" stroke-width="2.5"/>
  </g>
</svg>
